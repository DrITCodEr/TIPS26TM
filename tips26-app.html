funModeTitle:"🎉 Spaß-Modus",liveTitle:"🔴 Live-Ergebnisse",languageTitle:"🌐 Sprache",runButton:"🎲 Simulation starten",runButtonBusy:"⏳ Simuliere ...",runButtonTimes:"×",simDepth:{title:"Anzahl Turniere",hint:"Mehr Sims = genauere Wahrscheinlichkeiten",labelLow:"1 K",labelMid1:"10 K",labelMid2:"100 K",labelHigh:"1 Mio"},surprise:{title:"Überraschungs-Faktor",hint:"Tagesform-Streuung pro Team pro Match",scaleLow:"0 % (aus)",scaleMid:"50 %",scaleHigh:"100 % (chaotisch)",sigmaParen:s=>`(Stärke-Faktor pro Match ±${s} %)`,hint0:"Deterministisch — keine Tagesform-Streuung.",hint1:"Dezent — kleine Schwankungen, ähnliche Top-Favoriten.",hint2:"Spürbar — Außenseiter überraschen häufiger.",hint3:"Hoch — Top-Favoriten scheitern öfter in der K.o.-Phase.",hint4:"Sehr hoch — fast jedes Turnier bringt einen unerwarteten Champion."},overdisp:{title:"Tor-Streuung",hint:"Wie oft fallen ungewöhnlich viele Tore?",scaleLow:"0 % (Poisson)",scaleMid:"50 %",scaleHigh:"100 % (Burst)",phiParen:s=>`(Overdispersion φ = ${s})`,hint0:"Reine Poisson — Tore eng um λ verteilt, kaum 5+ Tor-Spiele.",hint1:"Leicht überdispers — etwas mehr 3:1, 4:1.",hint2:"Empirisch passend (φ≈0.5) — 4:1 / 5:1 kommen häufig vor.",hint3:"Spürbar — 5:0, 6:1, 4:3 keine Seltenheit.",hint4:"Hoch — gelegentlich 7:1 oder 6:0.",hint5:"Extrem — Torfestivals + 0:0-Defensiv-Festungen häufig nebeneinander."},live:{toggleTitle:"Reale Ergebnisse berücksichtigen",toggleOn:"AN — abgepfiffene Spiele werden in der Sim als fix übernommen, statt sie zu samplen. Beeinflusst Gruppentabellen, Bracket und Titelchancen sofort.",toggleOff:"AUS — Sim spielt jedes Match neu durch, ignoriert reale Ergebnisse. Liefert reine Pre-Turnier-Wahrscheinlichkeiten.",strengthTitle:"Form-Update aus Live-Daten",strengthHint:"Wie stark sollen tatsächliche Performance die Stärke einer Mannschaft korrigieren?",scaleLow:"0 % (kein Update)",scaleMid:"50 %",scaleHigh:"100 % (sehr stark)",strengthHint0:"Aus — nur Konditionierung, keine Stärken-Anpassung.",strengthHint1:"Sanft — leichte ELO-artige Korrektur, robust gegen Ausreißer.",strengthHint2:"Spürbar — Überraschungs-Siege verschieben die Titelchancen merklich.",strengthHint3:"Stark — eine Mannschaft die hoch gewinnt klettert deutlich im Ranking.",strengthHint4:"Aggressiv — kleines Sample (3 Gruppenspiele) führt zu Überreaktionen.",counter:s=>`${s} / 72 Gruppenspiele werden aktuell berücksichtigt.`,none:"Noch keine abgepfiffenen Spiele in den Live-Daten."},dfbCheat:{title:"Deutschland gewinnt immer",onLead:"🏆 AKTIV.",onText:"Jedes DFB-Spiel endet 3:0 für Deutschland, jede K.o.-Runde wird durchmarschiert. Mit Spanien, Frankreich & Co. wird im Halbfinale kurz reingeschaut — zum Frühstück gibts dann den Pokal.",offLead:"Easter-Egg.",offText:"Nur für den Bierkasten-Spaß. Schaltet jede Statistik aus und macht Deutschland deterministisch zum Weltmeister. Wissenschaftlich wertlos, emotional wertvoll."},perfWarn500k:(s,o)=>`🐢 Bei ${s} dauert die Sim ca. ${o}–${o*2} s.`,perfWarn100k:s=>`⏱️ Hoch: ca. ${s} s Wartezeit.`,perfInfo20k:s=>`Erwartung: ca. ${s} s.`,statusReady:"Bereit zum Simulieren",factorsHelp:"Stell mit jedem Slider ein, wie wichtig der Faktor für die Vorhersage sein soll. Faktoren mit hohem Wert beeinflussen die Stärke einer Mannschaft stärker, Faktoren auf 0 werden ignoriert. Du musst nicht auf Summe 100 % achten — die Gewichte werden am Ende automatisch normiert.",simDepthHelp:"Wie oft das Turnier zufällig durchgespielt wird. Bei 1.000 Sims sind die Wahrscheinlichkeiten grob, bei 100.000 sehr genau, bei 1 Mio fast exakt. Jedes Spiel wird einzeln gewürfelt — bei 100.000 Sims also 7,2 Mio Match-Simulationen. Mehr Sims = präziser, aber langsamer.",surpriseHelp:"Tagesform-Schwankungen. Bei 0 % spielt jede Mannschaft immer auf ihrem theoretischen Niveau. Bei 100 % schwankt die Stärke pro Spiel zufällig um bis zu ±30 % — Außenseiter überraschen häufiger, Top-Favoriten scheitern öfter. Realistisch sind 40–60 %: Tagesform existiert, ist aber begrenzt.",overdispHelp:"Wie stark die Tor-Anzahl vom Erwartungswert abweicht. Bei 0 % (reine Poisson) liegen die Tore eng am Mittel — 5+ Tor-Spiele sind selten. Bei 100 % gibt es häufig Torfestivals (6:1, 7:0) und auch wieder 0:0-Spiele. Echte WM-Daten passen am besten zu ca. 50 %."},presets:{default:"⭐ Empfehlung",balanced:"⚖️ Ausgewogen",elo:"📈 ELO-Fokus",market:"💰 Marktwert",form:"🔥 Form",experience:"🏛️ Erfahrung"},factors:{elo:"ELO-Rating",fifa:"FIFA-Punkte",markt:"Marktwert",form:"Aktuelle Form",heim:"Heimvorteil",wmHF:"WM-Erfahrung",trainer:"Trainer-Stärke",star:"Top-Star-Wert",hoehe:"Klima-Anpassung",eloHelp:"ELO ist ein Punktesystem aus dem Schach, das auf Fußball übertragen wurde. Es steigt nach Siegen gegen starke Gegner, fällt nach Niederlagen. Eines der zuverlässigsten Stärke-Maße — reflektiert Ergebnisse statt Meinungen.",fifaHelp:"Die offizielle Weltrangliste der FIFA. Nutzt eine etwas andere Formel als ELO und reagiert träger. Korrelliert eng mit ELO, deshalb beide gewichtet zu nutzen birgt Doppelzählungs-Gefahr.",marktHelp:"Summe der geschätzten Marktwerte aller 23 Kaderspieler (Transfermarkt). Reflektiert, wie viel der Markt auf das Team setzt — Talent plus aktuelle Form, gefiltert durch Klub-Trainer-Bewertungen.",formHelp:"Punkteausbeute der letzten 10–15 Länderspiele. Misst, ob das Team gerade in Form ist (heiße Phase) oder in einer Krise. Entscheidend für kurzfristige Vorhersagen, weniger für die langfristige Stärke.",heimHelp:"Wie nah sind die Spielorte am Heimland und wie viele Fans werden dabei sein? USA, Mexiko und Kanada profitieren am meisten. Andere Mannschaften können Reise-Strapazen und fremdes Klima haben.",wmHFHelp:"Anzahl bisheriger WM-Halbfinal-Teilnahmen. Misst, ob die Mannschaft Druck-Erfahrung hat. Studien zeigen: Erfahrene Teams scheitern seltener in K.o.-Runden gegen Newcomer.",trainerHelp:"Erfahrung und Trophäen-Bilanz des Coaches (Vereins- und Nationaltrainer). Trainer prägen Taktik, Mentalität und Kader-Auswahl — besonders bei knappen Spielen.",starHelp:"Marktwert des wertvollsten Spielers im Kader. Die Idee: in K.o.-Runden entscheiden oft individuelle Glanzleistungen (Messi, Mbappé). Ein Top-Star kann ein durchschnittliches Team weit tragen.",hoeheHelp:"Anpassung an Hitze, Höhe und Klima an den 16 Spielorten — von kühlem Vancouver bis 38 °C in Houston, Mexiko-Stadt auf 2.240 m. Teams aus ähnlichen Klimazonen sind im Vorteil."},algoInfo:{v1Title:"TIPS-26.1",v1Tag:"Classic",v1Desc:"9-Faktor linear · add. Poisson",v1Details:"Lineare gewichtete Aggregation der 9 Faktoren · additive Poisson-Tor-Formel <code>λ = 1.4 + Δ·3.5</code>.",v2Title:"TIPS-26.2",v2Tag:"Advanced",v2Desc:"Log-linear · Dixon-Coles · Markt",v2Details:"Forschungs-basiert (Maher 1982 / Dixon-Coles 1997 / Groll et al. 2019):<br/>• Log-lineare Tor-Formel <code>λ = exp(c + Δ·s)</code><br/>• Dixon-Coles τ-Korrektur (mehr 1:1)<br/>• Markt-Konsens-Blend (70 % TIPS + 30 % Bookmaker)<br/>• Composite-Score ELO+FIFA+Markt<br/>• Nicht-linearer Boost für Top-Form-Teams",v3Title:"TIPS-26.3",v3Tag:"Player",v3Desc:"v2 + Player-Aggregates",v3Details:"v2 + Player-Level-Features (Stübinger 2020):<br/>• Top-11-Marktwert<br/>• %-Top-5-Ligen<br/>• UCL-Spieler<br/>• Squad-xG / xGA<br/>• GK Post-Shot xG Save %<br/>Blend 70 % v2 + 30 % Player-Composite. <strong>Demo-Daten.</strong>",v4Title:"TIPS-26.4",v4Tag:"Ensemble",v4Desc:"Stacking v1+v2+v3",v4Details:"Ensemble-Stacking nach §9.13:<br/><code>final = 0.15·v1 + 0.45·v2 + 0.40·v3</code><br/>ML-Aggregator-Schnittstelle (ONNX) liegt bereit für späteren XGBoost-Drop-in.",v5Title:"TIPS-26.5",v5Tag:"Bivariate",v5Desc:"v2-Stärken + Bivariate Poisson",v5Details:"Exakte Bivariate Poisson (Karlis & Ntzoufras 2003) statt DC-Resampling:<br/><code>X_A = X_1 + X_3</code>, <code>X_B = X_2 + X_3</code>, λ_3 = 0.2<br/>Marginal-Mittelwerte wie v2, positive Korrelation der Tore beider Teams. Mehr Diagonal-Remis (2:2, 3:3).",badgeCalculated:"Berechnet mit",cheatBadge:"🇩🇪 CHEAT-MODE aktiv",infoLabel:"Wie funktioniert das?",simpleV1:"Die einfachste Variante. Jeder der 9 Faktoren (ELO, Marktwert, Form …) bekommt ein Gewicht, alles wird zusammenaddiert — das ergibt die Stärke einer Mannschaft. Aus der Differenz zweier Stärken werden die Tore zufällig gezogen (Poisson-Verteilung). Schnell und transparent. Schwäche: ELO und FIFA messen ähnliches, das doppelte Gewichten verzerrt etwas.",simpleV2:"Wissenschaftlich solider. Die Tor-Formel ist exponentiell statt linear — passt besser, wenn ein Team klar stärker ist. Eine zusätzliche Korrektur (Dixon-Coles) macht 1:1-Spiele realistisch häufig. Und 30 % der Prognose kommen aus echten Buchmacher-Quoten — der Markt weiß Dinge (Verletzungen, Insider-Wissen), die das Modell nicht weiß.",simpleV3:"v2 plus Spielerdaten. Wir berücksichtigen den Kader-Marktwert, wie viele Spieler in den Top-Ligen aktiv sind, erwartete Tore (xG) und Torwart-Qualität. Diese Spielerdaten machen 30 % der Stärke aus, der Rest kommt von v2. Idee: Talent erzeugt Erfolg — eine Mannschaft mit teurer Top-11 hat im Schnitt bessere Chancen.",simpleV4:'Drei Modelle gemittelt: 15 % v1 + 45 % v2 + 40 % v3. Schwächen einzelner Modelle heben sich gegenseitig auf. Das ist ein bewährtes Verfahren aus ML-Wettbewerben ("Stacking"). In der Praxis liefert es etwas stabilere Rankings als jedes Einzelmodell.',simpleV5:'Wie v2, aber die Tore beider Teams werden gemeinsam gezogen statt unabhängig. Realistischer: in einem offenen Spiel fallen oft auf beiden Seiten Tore (2:2, 3:3), in einem defensiven Spiel auf beiden Seiten wenige. Mathematisch heißt das "Bivariate Poisson".'},groups:{bannerStrong:"Gruppensieger-Vorhersage.",bannerText:"Pro Team siehst Du die Wahrscheinlichkeit für jede Position. Mintfarbene Zahl = P(Platz 1).",favorite:"🏅 Favorit",groupLabel:s=>`Gruppe ${s}`,qualify:"Quali",emptyTitle:"Noch keine Simulation gestartet.",emptyLeadGoToSetup:"Setup",emptyTail:"und starte die Simulation, um die Wahrscheinlichkeiten zu sehen.",emptyMid:"Wechsle zu"},matches:{bannerStrong:"Alle 72 Gruppenphasen-Spiele",bannerTex ",titleEdgeStand:"Markt-Quoten Stand",titleEdgeSources:"aggregiert aus",titleEdgeMargin:"Bookmaker-Margin entzerrt.",matchEdgeTitle:"⚽ Match-Edge (markt-konsistent abgeleitet)",matchEdgeBanner:"Buchmacher öffnen Match-Märkte erst kurz vor Anpfiff. Hier aus Outright-Quoten + Poisson-Modell markt-konsistent abgeleitet. Top 15 mit größter Abweichung:",market:"Markt",sim:"Sim",pp:"pp"},germany:{badge:"🇩🇪 DEUTSCHLAND",title:"DFB-Team in",titleGroup:"Gruppe E",meta:"🇨🇼 Curaçao · 🇨🇮 Elfenbeinküste · 🇪🇨 Ecuador",matchesTitle:"⚽ Die 3 Gruppenspiele",promptForSim:"Starte die Simulation, um Wahrscheinlichkeiten zu sehen.",avgGoals:"Tore",topScore:"Top",koPathsTitle:"🎯 K.o.-Wege",koPathWinner:"Bei Gruppensieg (Platz 1)",koPathWinnerR32:"R32: 29.06. · Foxborough · vs 3ABCDF",koPathWinnerR16:"Achtel: 04.07. · Philadelphia",koPathWinnerQF:"Viertel: 09.07. · Boston",koPathSecond:"Bei Platz 2",koPathSecondR32:"R32: 30.06. · Arlington · vs 2I",koPathSecondR16:"Achtel: 05.07. · Houston",playerAggregatesTitle:"🧬 Player-Aggregates (TIPS-26.3)",statTop11:"Top-11-Marktwert",statTop11Unit:"Mio €",statTop5Leagues:"% in Top-5-Ligen",statUcl:"UCL-Spieler",statUclMax:"/23",statXgAttack:"Squad-xG (off.)",statXgaDefense:"xGA (def.)",statXgUnit:"/Spiel",statGkPsxg:"GK Post-Shot xG Save %",profileTitle:"💪 Stärken-Profil",kaderMarktwert:"Kader-Marktwert",keyPlayers:"Schlüsselspieler: Florian Wirtz, Jamal Musiala, Kai Havertz, Joshua Kimmich (C), Antonio Rüdiger."},bracket:{bannerStrong:"K.o.-Bracket nach FIFA-Schema.",bannerAllDone:"Alle Gruppenspiele abgeschlossen — die R32-Paarungen sind final.",bannerProgress:s=>`Slot-Labels gemäß offizieller FIFA-Tabelle. ${s} / 72 Gruppenspielen aktualisiert. Sobald die Gruppenphase fertig ist, fülle ich die Slots automatisch.`,lastUpdate:"Live-Daten zuletzt aktualisiert:",r32Title:"🎯 Sechzehntelfinale (R32)",r32Match:"R32 · Match",vs:"vs",datesTitle:"📅 Bracket-Termine",dateR32:"R32 (Sechzehntelfinale)",dateR32V:"28. Juni – 02. Juli",dateR16:"R16 (Achtelfinale "Panama"}},o0={splash:{title:"Choose your language",subtitle:"Sprache wählen",continue:"Continue in English",later:"You can change the language anytime in the Setup tab."},app:{subtitle:"Thomas-Irawan Predictive Stochastics",subtitle2:"Bayesian Monte-Carlo · 9-Factor Ensemble",version:"Version 3.0.0"},nav:{home:"Home",setup:"Setup",groups:"Groups",matches:"Matches",ranking:"Ranking",sensitivity:"Stability",edge:"Edge",germany:"Germany",tree:"Tree"},home:{heroGroup:"🇩🇪 GROUP E",heroTitlePre:"Germany kicks off on",heroTitleDate:"June 14, 2026",heroMeta:"vs. 🇨🇼 Curaçao · 7 PM CEST · NRG Stadium, Houston",statTeams:"Teams",statTeamsDetail:"in 12 groups",statMatches:"Matches",statMatchesDetail:"in 39 days",statStadiums:"Venues",statStadiumsDetail:"3 countries",keyDates:"📅 Key Dates",opening:"Opening Match",openingDate:"June 11, 2026",groupStage:"Group Stage",groupStageDate:"Jun 11 – Jun 27",knockoutStage:"Knockout Stage",knockoutStageDate:"Jun 28 – Jul 18",finalLabel:"🏆 The Final",finalDate:"Sun, Jul 19, 2026 · 9 PM CEST",finalVenue:"MetLife Stadium · East Rutherford, NJ",allGroups:"🌐 All 12 Groups",modelTitle:"🔬 The TIPS-26 Model",modelHeader:"Thomas-Irawan Predictive Stochastics",modelText:"5 selectable model variants (v1 Classic → v5 Bivariate), Monte Carlo up to 1M simulations, FIFA-compliant knockout bracket, player-level aggregates, market edge vs. bookmaker consensus.",modelCopyright:"© Thomas-Irawan Method · TIPS-26™ Version 3.0.0 · Single-File Build",quickStartLead:"Quick start:",quickStartGoToSetup:"Setup",quickStartTail:", start the simulation, then explore groups, matches or the ranking.",linkBracket:"🏆 Knockout Bracket (Live Status) →",linkBacktest:"🔬 Backtest against WCs 2014 / 2018 / 2022 →",statsTitle:"📊 Tournament Stats"},setup:{banner:"9 factors drive the prediction. Tune the sliders, pick a model, and start the simulation.",bannerStrong:"9 factors drive the prediction.",algoTitle:"🧮 Algorithm",presetsTitle:"🎯 Presets",weightsTitle:"🎚️ Weights",simDepthTitle:"🎲 Simulation Depth",surpriseTitle:"🎰 Surprise Factor",overdispTitle:"⚡ Goal Variance",funModeTitle:"🎉 Fun Mode",liveTitle:"🔴 Live results",languageTitle:"🌐 Language",runButton:"🎲 Run Simulation",runButtonBusy:"⏳ Simulating ...",runButtonTimes:"×",simDepth:{title:"Number of Tournaments",hint:"More sims = sharper probabilities",labelLow:"1 K",labelMid1:"10 K",labelMid2:"100 K",labelHigh:"1 M"},surprise:{title:"Surprise Factor",hint:"Daily-form spread per team per match",scaleLow:"0 % (off)",scaleMid:"50 %",scaleHigh:"100 % (chaotic)",sigmaParen:s=>`(strength factor per match ±${s} %)`,hint0:"Deterministic — no daily-form spread.",hint1:"Subtle — small swings, top favorites stay top.",hint2:"Noticeable — underdogs surprise more often.",hint3:"High — top favorites fail more often in the knockout stage.",hint4:"Very high — almost every tournament produces an unexpected champion."},overdisp:{title:"Goal Variance",hint:"How often do unusually high-scoring matches happen?",scaleLow:"0 % (Poisson)",scaleMid:"50 %",scaleHigh:"100 % (Burst)",phiParen:s=>`(overdispersion φ = ${s})`,hint0:"Pure Poisson — goals tightly around λ, rarely 5+ goal matches.",hint1:"Slightly overdispersed — a bit more 3:1, 4:1.",hint2:"Empirically calibrated (φ≈0.5) — 4:1 / 5:1 happen often.",hint3:"Noticeable — 5:0, 6:1, 4:3 not uncommon.",hint4:"High — occasional 7:1 or 6:0.",hint5:"Extreme — goal festivals + 0:0 defensive fortresses next to each other."},live:{toggleTitle:"Use real results",toggleOn:"ON — finished matches are treated as fixed in the sim instead of being resampled. Affects group tables, bracket and title chances immediately.",toggleOff:"OFF — sim replays every match from scratch, ignoring real results. Yields pure pre-tournament probabilities.",strengthTitle:"Form update from live data",strengthHint:"How strongly should actual performance correct a team's strength?",scaleLow:"0 % (no update)",scaleMid:"50 %",scaleHigh:"100 % (very strong)",strengthHint0:"Off — conditioning only, no strength adjustment.",strengthHint1:"Gentle — light ELO-style correction, robust against outliers.",strengthHint2:"Noticeable — upset wins visibly shift title probabilities.",strengthHint3:"Strong — a team that wins big climbs the ranking clearly.",strengthHint4:"Aggressive — small sample (3 group matches) leads to overreactions.",counter:s=>`${s} / 72 group matches currently incorporated.`,none:"No finished matches in the live data yet."},dfbCheat:{title:"Germany always wins",onLead:"🏆 ACTIVE.",onText:"Every German match ends 3:0 for Germany, every knockout round is marched through. Spain, France & Co. only show up briefly in the semis — the trophy is on the breakfast table.",offLead:"Easter egg.",offText:"Pub-table fun only. Disables every statistic and turns Germany into the deterministic world champion. Scientifically worthless, emotionally priceless."},perfWarn500k:(s,o)=>`🐢 At ${s} the simulation takes about ${o}–${o*2}s.`,perfWarn100k:s=>`⏱️ High: about ${s}s waiting time.`,perfInfo20k:s=>`Expected: about ${s}s.`,statusReady:"Ready to simulate",factorsHelp:"Each slider sets how important a factor is for the forecast. Factors with higher weight influence a team's strength more; factors set to 0 are ignored. You don't need to make them sum to 100% — weights are normalized automatically at the end.",simDepthHelp:"How many times the tournament is randomly played through. With 1,000 sims the probabilities are rough; with 100,000 very accurate; with 1M almost exact. Each match is sampled individually — at 100,000 sims that's 7.2M match simulations. More sims = sharper, but slower.",surpriseHelp:"Daily form variance. At 0% every team always plays at its theoretical level. At 100% strength varies per match by up to ±30% — underdogs surprise more often, top favorites fail more often. Realistic values are 40–60%: daily form exists but is limited.",overdispHelp:"How much goal counts deviate from the expected value. At 0% (pure Poisson) goals cluster tightly around the mean — 5+ goal matches are rare. At 100% you see frequent goal festivals (6:1, 7:0) and also more 0:0 matches. Real WC data fits best around 50%."},presets:{default:"⭐ Recommended",balanced:"⚖️ Balanced",elo:"📈 ELO Focus",market:"💰 Market Value",form:"🔥 Form",experience:"🏛️ Experience"},factors:{elo:"ELO Rating",fifa:"FIFA Points",markt:"Market Value",form:"Recent Form",heim:"Home Advantage",wmHF:"WC Experience",trainer:"Coach Quality",star:"Top Star Value",hoehe:"Climate Adjustment",eloHelp:"ELO is a points system borrowed from chess and applied to football. It rises after wins against strong opponents and falls after losses. One of the most reliable strength measures — reflects results, not opinions.",fifaHelp:"The official FIFA world ranking. Uses a slightly different formula than ELO and reacts more slowly. Correlates closely with ELO, so weighting both risks double-counting.",marktHelp:"Sum of estimated market values of all 23 squad players (Transfermarkt). Reflects how much the market backs the team — talent plus current form, filtered through club-coach evaluations.",formHelp:"Points from the last 10–15 international matches. Measures whether the team is in form (hot streak) or in a crisis. Crucial for short-term predictions, less so for long-term strength.",heimHelp:"How close are the venues to the home country and how many fans will travel? USA, Mexico and Canada benefit most. Other teams may face travel fatigue and unfamiliar climates.",wmHFHelp:"Number of previous WC semifinal appearances. Measures whether the team has pressure experience. Studies show: experienced teams fail less often in knockout rounds against newcomers.",trainerHelp:"Experience and trophy record of the coach (club and national team). Coaches shape tactics, mentality and squad selection — especially in tight matches.",starHelp:"Market value of the most valuable player in the squad. The idea: knockout rounds are often decided by individual brilliance (Messi, Mbappé). A top star can carry an average team far.",hoeheHelp:"Adjustment for heat, altitude and climate at the 16 venues — from cool Vancouver to 38°C in Houston, Mexico City at 2,240 m. Teams from similar climate zones have an edge."},algoInfo:{v1Title:"TIPS-26.1",v1Tag:"Classic",v1Desc:"9-factor linear · additive Poisson",v1Details:"Linear weighted aggregation of 9 factors · additive Poisson goal formula <code>λ = 1.4 + Δ·3.5</code>.",v2Title:"TIPS-26.2",v2Tag:"Advanced",v2Desc:"Log-linear · Dixon-Coles · Market",v2Details:"Research-based (Maher 1982 / Dixon-Coles 1997 / Groll et al. 2019):<br/>• Log-linear goal formula <code>λ = exp(c + Δ·s)</code><br/>• Dixon-Coles τ correction (more 1:1 results)<br/>• Market consensus blend (70% TIPS + 30% bookmaker)<br/>• Composite score ELO+FIFA+Market<br/>• Non-linear boost for top-form teams",v3Title:"TIPS-26.3",v3Tag:"Player",v3Desc:"v2 + player aggregates",v3Details:"v2 + player-level features (Stübinger 2020):<br/>• Top-11 market value<br/>• % Top-5 leagues<br/>• UCL players<br/>• Squad xG / xGA<br/>• GK Post-Shot xG Save %<br/>Blend 70% v2 + 30% player composite. <strong>Demo data.</strong>",v4Title:"TIPS-26.4",v4Tag:"Ensemble",v4Desc:"Stacking v1+v2+v3",v4Details:"Ensemble stacking per §9.13:<br/><code>final = 0.15·v1 + 0.45·v2 + 0.40·v3</code><br/>ML aggregator interface (ONNX) ready for a later XGBoost drop-in.",v5Title:"TIPS-26.5",v5Tag:"Bivariate",v5Desc:"v2 strengths + bivariate Poisson",v5Details:"Exact bivariate Poisson (Karlis & Ntzoufras 2003) instead of DC resampling:<br/><code>X_A = X_1 + X_3</code>, <code>X_B = X_2 + X_3</code>, λ_3 = 0.2<br/>Marginal means equal to v2, positive correlation between goal counts. More diagonal draws (2:2, 3:3).",badgeCalculated:"Computed with",cheatBadge:"🇩🇪 CHEAT MODE active",infoLabel:"How does this work?",simpleV1:"The simplest variant. Each of the 9 factors (ELO, market value, form …) gets a weight, all summed up — that's the team's strength. From the strength gap between two teams, goals are drawn at random (Poisson distribution). Fast and transparent. Weakness: ELO and FIFA measure similar things; weighting both can double-count.",simpleV2:"Scientifically more solid. The goal formula is exponential instead of linear — fits better when one team is clearly stronger. An extra correction (Dixon-Coles) makes 1:1 draws realistically frequent. And 30% of the forecast comes from real bookmaker odds — the market knows things (injuries, insider info) the model doesn't.",simpleV3:"v2 plus player data. We factor in squad market value, how many players are active in top leagues, expected goals (xG) and goalkeeper quality. Player data makes up 30% of the strength, the rest comes from v2. Idea: talent drives success — a team with an expensive top-11 has better odds on average.",simpleV4:'Three models averaged: 15% v1 + 45% v2 + 40% v3. Weaknesses of individual models cancel each other out. This is a proven technique from ML competitions ("stacking"). In practice it yields slightly more stable rankings than any single model.',simpleV5:'Like v2, but goals for both teams are sampled jointly instead of independently. More realistic: in an open match goals often fall on both sides (2:2, 3:3); in a defensive match few on both sides. Mathematically this is "bivariate Poisson".'},groups:{bannerStrong:"Group winner prediction.",bannerText:"Per team, you see the probability for each position. Mint number = P(1st place).",favorite:"🏅 Favorite",groupLabel:s=>`Group ${s}`,qualify:"Qual",emptyTitle:"No simulation run yet.",emptyLeadGoToSetup:"Setup",emptyTail:"and run the simulation to see the probabilities.",emptyMid:"Switch to"},matches:{bannerStrong:"All 72 group-stage matches",bannerText:"with date, kickoff (CEST), and venue.",bannerWithSim:"Including win probabilities from the simulation.",bannerNoSim:"Start a simulation to see win probabilities.",filterAll:"All",filterDfb:"🇩🇪 GER",pillFinished:"FINAL",pillLive:"🔴 LIVE",vs:"vs",groupPrefix:"Group",avgGoals:"goals",promptForSi
