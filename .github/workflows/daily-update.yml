name: WM 2026 Live-Update

on:
  schedule:
    # 4× täglich UTC (entspricht ungefähr 02/08/14/20 Uhr MESZ)
    - cron: "0 0,6,12,18 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if WM-Finale already passed
        id: cutoff
        run: |
          TODAY=$(date -u +%s)
          FINALE=$(date -u -d "2026-07-20" +%s)
          if [ "$TODAY" -gt "$FINALE" ]; then
            echo "WM-Finale liegt vor heute — Workflow exit-ed."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node
        if: steps.cutoff.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies (frontend)
        if: steps.cutoff.outputs.skip != 'true'
        working-directory: frontend
        run: npm ci

      - name: Install dependencies (singlefile)
        if: steps.cutoff.outputs.skip != 'true'
        working-directory: singlefile
        run: npm ci

      - name: Update live results from football-data.org
        if: steps.cutoff.outputs.skip != 'true'
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
        run: node scripts/update-live-results.mjs

      - name: Rebuild single-file HTML
        if: steps.cutoff.outputs.skip != 'true'
        working-directory: singlefile
        run: npm run build

      - name: Commit and push if changed
        if: steps.cutoff.outputs.skip != 'true'
        run: |
          git config user.name "tips26-bot"
          git config user.email "tips26-bot@users.noreply.github.com"
          git add frontend/lib/data/liveResults.ts tips26-app.html
          if git diff --staged --quiet; then
            echo "Keine Änderungen — nichts zu committen."
          else
            git commit -m "chore(live): auto-update WM-Live-Ergebnisse"
            git push
          fi
